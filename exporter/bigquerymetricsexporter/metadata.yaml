type: bigquerymetrics
display_name: BigQuery Metrics Exporter

status:
  class: exporter
  stability:
    development: [metrics]
  codeowners:
    active: []

tests:
  skip_lifecycle: true
  goleak:
    ignore:
      top:
        # See https://github.com/census-instrumentation/opencensus-go/issues/1191 for more information.
        - "go.opencensus.io/stats/view.(*worker).start"
